trigger:
  batch: "true"
  branches:
    include:
    - main

resources:
  repositories:
  - repository: cnp-azuredevops-libraries
    type: github
    ref: refs/heads/master
    name: hmcts/cnp-azuredevops-libraries
    endpoint: 'hmcts'

parameters:
  - name: overrideAction
    type: string
    default: plan
    values:
    - plan
    - apply
    - destroy

  - name: environment_components
    type: object
    default:
    - deployment: 'ptlsbox_jenkins'
      environment: 'ptlsbox'
      component: 'jenkins'
      service_connection: 'OPS-APPROVAL-GATE-PTLSBOX-ENVS'
      dependsOn: 'Precheck'
      tfvars_file: ''
      backend_resource_group_name: ''
    - deployment: 'ptl_jenkins'
      environment: 'ptl'
      component: 'jenkins'
      service_connection: 'OPS-APPROVAL-GATE-PTL-ENVS'
      dependsOn: 'Precheck'
      tfvars_file: ''
      backend_resource_group_name: ''
    - deployment: 'sbox_jenkins_agent_identities'
      environment: 'sbox'
      component: 'jenkins-agent-identities'
      service_connection: 'OPS-APPROVAL-GATE-SBOX-ENVS'
      dependsOn: 'Precheck'
      tfvars_file: '$(System.DefaultWorkingDirectory)/$(buildRepoSuffix)/environments/jenkins-agent-identities/sbox.tfvars'
      backend_resource_group_name: 'azure-control-sbox-rg'
    - deployment: 'preview_jenkins_agent_identities'
      environment: 'preview'
      component: 'jenkins-agent-identities'
      service_connection: 'OPS-APPROVAL-GATE-DEV-ENVS'
      dependsOn: 'Precheck'
      tfvars_file: '$(System.DefaultWorkingDirectory)/$(buildRepoSuffix)/environments/jenkins-agent-identities/preview.tfvars'
      backend_resource_group_name: 'azure-control-dev-rg'
    - deployment: 'aat_jenkins_agent_identities'
      environment: 'aat'
      component: 'jenkins-agent-identities'
      service_connection: 'OPS-APPROVAL-GATE-STG-ENVS'
      dependsOn: 'Precheck'
      tfvars_file: '$(System.DefaultWorkingDirectory)/$(buildRepoSuffix)/environments/jenkins-agent-identities/aat.tfvars'
      backend_resource_group_name: 'azure-control-stg-rg'
    - deployment: 'ithc_jenkins_agent_identities'
      environment: 'ithc'
      component: 'jenkins-agent-identities'
      service_connection: 'OPS-APPROVAL-GATE-ITHC-ENVS'
      dependsOn: 'Precheck'
      tfvars_file: '$(System.DefaultWorkingDirectory)/$(buildRepoSuffix)/environments/jenkins-agent-identities/ithc.tfvars'
      backend_resource_group_name: 'azure-control-ithc-rg'
    - deployment: 'perftest_jenkins_agent_identities'
      environment: 'perftest'
      component: 'jenkins-agent-identities'
      service_connection: 'OPS-APPROVAL-GATE-TEST-ENVS'
      dependsOn: 'Precheck'
      tfvars_file: '$(System.DefaultWorkingDirectory)/$(buildRepoSuffix)/environments/jenkins-agent-identities/perftest.tfvars'
      backend_resource_group_name: 'azure-control-test-rg'
    - deployment: 'demo_jenkins_agent_identities'
      environment: 'demo'
      component: 'jenkins-agent-identities'
      service_connection: 'OPS-APPROVAL-GATE-DEMO-ENVS'
      dependsOn: 'Precheck'
      tfvars_file: '$(System.DefaultWorkingDirectory)/$(buildRepoSuffix)/environments/jenkins-agent-identities/demo.tfvars'
      backend_resource_group_name: 'azure-control-demo-rg'
    - deployment: 'prod_jenkins_agent_identities'
      environment: 'prod'
      component: 'jenkins-agent-identities'
      service_connection: 'OPS-APPROVAL-GATE-PROD-ENVS'
      dependsOn: 'Precheck'
      tfvars_file: '$(System.DefaultWorkingDirectory)/$(buildRepoSuffix)/environments/jenkins-agent-identities/prod.tfvars'
      backend_resource_group_name: 'azure-control-prod-rg'
    - deployment: 'ptlsbox_jenkins_agent_identities'
      environment: 'ptlsbox'
      component: 'jenkins-agent-identities'
      service_connection: 'OPS-APPROVAL-GATE-PTLSBOX-ENVS'
      dependsOn: 'Precheck'
      tfvars_file: '$(System.DefaultWorkingDirectory)/$(buildRepoSuffix)/environments/jenkins-agent-identities/ptlsbox.tfvars'
      backend_resource_group_name: 'azure-control-ptlsbox-rg'
    - deployment: 'ptl_jenkins_agent_identities'
      environment: 'ptl'
      component: 'jenkins-agent-identities'
      service_connection: 'OPS-APPROVAL-GATE-PTL-ENVS'
      dependsOn: 'Precheck'
      tfvars_file: '$(System.DefaultWorkingDirectory)/$(buildRepoSuffix)/environments/jenkins-agent-identities/ptl.tfvars'
      backend_resource_group_name: 'azure-control-ptl-rg'

variables:
  - name: timeoutInMinutes
    value: "60"
  - name: agentPool
    value: ubuntu-22.04
  - name: build
    value: $(Build.BuildNumber)
  - name: product
    value: cft-jenkins
  - name: terraformInitSubscription
    value: 04d27a32-7a07-48b3-95b8-3c8691e1a263
  - template: vars/input-variables.yaml@cnp-azuredevops-libraries

stages:
  - stage: Precheck
    jobs:
      - job: Precheck
        pool:
          vmImage: ${{ variables.agentPool }}
        timeoutInMinutes: ${{ variables.timeoutInMinutes }}
        steps:
          - template: steps/terraform-precheck.yaml@cnp-azuredevops-libraries
            parameters:
              keyvaultName: 'infra-vault-nonprod'
              keyvaultSecret: 'azure-devops-sp-token'
              serviceConnection: 'DCD-CFT-Sandbox'
              overrideAction: ${{ parameters.overrideAction }}

  - ${{ each deployment in parameters.environment_components }}:
    - stage: ${{ deployment.deployment }}
      dependsOn: ${{ deployment.dependsOn }}
      jobs:
        - job: TerraformPlanApply
          pool:
            vmImage: ${{ variables.agentPool }}
          timeoutInMinutes: ${{ variables.timeoutInMinutes }}
          steps:
          - template: steps/terraform.yaml@cnp-azuredevops-libraries
            parameters:
              overrideAction: ${{ parameters.overrideAction }}
              environment: ${{ deployment.environment }}
              component: ${{ deployment.component }}
              serviceConnection: ${{ deployment.service_connection }}
              terraformInitSubscription: ${{ variables.terraformInitSubscription }}
              backendResourceGroupName: ${{ deployment.backend_resource_group_name }}
              product: ${{ variables.product }}
              tfVarsFile: ${{ deployment.tfvars_file }}
